<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>마음 처방 — 칠정 호흡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15141A;
    --bg-soft:#1E1C24;
    --ink:#EDE9E0;
    --ink-dim:#9B958A;
    --line:rgba(237,233,224,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    font-weight:300;
    min-height:100vh;
    min-height:100dvh;
  }
  .screen{
    position:fixed;top:0;left:0;width:100%;height:100vh;height:100dvh;
    display:none;
    flex-direction:column;align-items:center;justify-content:center;
    padding:24px;
    overflow-y:auto;
    background:var(--bg);
  }
  .screen.on{display:flex;animation:fadein .5s ease}
  @keyframes fadein{from{opacity:0}to{opacity:1}}

  /* ---------- intro / select ---------- */
  .eyebrow{
    font-size:12px;letter-spacing:.35em;color:var(--ink-dim);
    margin-bottom:14px;text-transform:uppercase;
  }
  h1{
    font-family:'Gowun Batang',serif;font-weight:400;
    font-size:clamp(24px,6vw,34px);line-height:1.5;text-align:center;
    margin-bottom:36px;
  }
  .grid{
    display:grid;grid-template-columns:repeat(2,1fr);gap:12px;
    width:100%;max-width:420px;
  }
  .emo{
    background:var(--bg-soft);border:1px solid var(--line);border-radius:18px;
    padding:18px 14px;cursor:pointer;text-align:center;
    transition:transform .25s ease,border-color .25s ease,box-shadow .25s ease;
    color:var(--ink);
  }
  .emo:active{transform:scale(.96)}
  .emo .hanja{
    font-family:'Gowun Batang',serif;font-size:34px;display:block;margin-bottom:6px;
    color:var(--c,var(--ink));
  }
  .emo .name{font-size:15px;font-weight:400}
  .emo .desc{font-size:12px;color:var(--ink-dim);margin-top:4px}
  .emo.wide{grid-column:1/-1}
  .foot{margin-top:30px;font-size:12px;color:var(--ink-dim);text-align:center;line-height:1.8}

  /* ---------- breath screen ---------- */
  #breath{justify-content:space-between;padding:40px 24px 32px}
  .b-head{text-align:center}
  .b-head .hanja-big{
    font-family:'Gowun Batang',serif;font-size:20px;color:var(--ec);
    letter-spacing:.3em;
  }
  .b-head h2{
    font-family:'Gowun Batang',serif;font-weight:400;
    font-size:22px;margin-top:8px;
  }
  .orb-wrap{
    position:relative;width:min(64vw,260px);height:min(64vw,260px);
    display:flex;align-items:center;justify-content:center;
    flex:0 0 auto;
  }
  .orb{
    position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle at 38% 32%, var(--ec-soft), var(--ec) 70%);
    filter:blur(2px);
    transform:scale(.62);
    box-shadow:0 0 80px var(--ec-glow);
  }
  .orb-ring{
    position:absolute;inset:-14px;border-radius:50%;
    border:1px solid var(--line);
  }
  .orb-hanja{
    position:relative;font-family:'Gowun Batang',serif;
    font-size:54px;color:rgba(21,20,26,.55);
    user-select:none;
  }
  .phase{
    font-family:'Gowun Batang',serif;font-size:20px;letter-spacing:.2em;
    height:30px;text-align:center;
  }
  .count{font-size:13px;color:var(--ink-dim);height:20px;text-align:center;margin-top:6px}
  .b-guide{
    text-align:center;font-size:14px;line-height:2;color:var(--ink-dim);
    max-width:340px;
  }
  .b-guide strong{color:var(--ink);font-weight:400}
  .btn-row{display:flex;gap:12px;margin-top:8px}
  button.pill{
    font-family:'Noto Sans KR',sans-serif;font-weight:400;
    background:none;border:1px solid var(--line);color:var(--ink);
    border-radius:999px;padding:12px 26px;font-size:14px;cursor:pointer;
    transition:background .25s;
  }
  button.pill:active{background:var(--bg-soft)}
  button.pill.primary{border-color:var(--ec);color:var(--ec)}
  .cycle-note{font-size:12px;color:var(--ink-dim);margin-top:10px}

  /* ---------- closing ---------- */
  #close .wisdom{
    font-family:'Gowun Batang',serif;font-size:clamp(19px,5vw,24px);
    line-height:2;text-align:center;max-width:380px;
  }
  #close .src{font-size:12px;color:var(--ink-dim);margin-top:18px;letter-spacing:.15em}
  #close .btn-row{margin-top:48px}

  /* ---------- memo ---------- */
  .memo-box{margin-top:34px;width:100%;max-width:340px;text-align:center}
  .memo-box input{
    width:100%;background:var(--bg-soft);border:1px solid var(--line);
    border-radius:14px;padding:13px 16px;color:var(--ink);
    font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;
  }
  .memo-box input::placeholder{color:var(--ink-dim)}
  .memo-saved{font-size:12px;color:var(--ink-dim);height:18px;margin-top:8px}

  /* ---------- weather ---------- */
  .link-btn{
    background:none;border:none;color:var(--ink-dim);font-size:13px;
    font-family:'Noto Sans KR',sans-serif;cursor:pointer;
    border-bottom:1px solid var(--line);padding-bottom:2px;margin-top:18px;
  }
  #weather{justify-content:flex-start;padding-top:56px}
  .w-head{text-align:center;margin-bottom:30px}
  .w-head h2{font-family:'Gowun Batang',serif;font-weight:400;font-size:24px}
  .w-head .sub{font-size:13px;color:var(--ink-dim);margin-top:8px}
  .w-list{width:100%;max-width:400px;display:flex;flex-direction:column;gap:13px}
  .w-row{display:flex;align-items:center;gap:12px}
  .w-row .wh{font-family:'Gowun Batang',serif;font-size:20px;width:28px;text-align:center}
  .w-row .wn{font-size:12px;color:var(--ink-dim);width:38px}
  .w-bar-track{flex:1;height:10px;background:var(--bg-soft);border-radius:99px;overflow:hidden}
  .w-bar{height:100%;border-radius:99px;width:0;transition:width .8s ease}
  .w-row .wc{font-size:13px;width:24px;text-align:right;color:var(--ink-dim)}
  .w-insight{
    margin-top:32px;max-width:380px;text-align:center;
    font-family:'Gowun Batang',serif;font-size:16px;line-height:2;
  }
  .w-empty{
    margin-top:40px;text-align:center;color:var(--ink-dim);
    font-size:14px;line-height:2.2;
  }
  .w-days{display:flex;gap:8px;margin-top:30px;flex-wrap:wrap;justify-content:center;max-width:380px}
  .w-day{
    display:flex;flex-direction:column;align-items:center;gap:5px;
    font-size:11px;color:var(--ink-dim);
  }
  .w-day .dot{
    width:34px;height:34px;border-radius:50%;background:var(--bg-soft);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
    font-family:'Gowun Batang',serif;font-size:16px;
  }

  /* ---------- 기간 탭 & 표 ---------- */
  .w-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:26px}
  .w-tab{
    background:none;border:1px solid var(--line);color:var(--ink-dim);
    border-radius:999px;padding:8px 18px;font-size:13px;cursor:pointer;
    font-family:'Noto Sans KR',sans-serif;
  }
  .w-tab.on{border-color:var(--ink);color:var(--ink)}
  .w-table-wrap{width:100%;max-width:420px;margin-top:30px;overflow-x:auto}
  table.wt{width:100%;border-collapse:collapse;font-size:13px}
  table.wt th{
    font-weight:400;color:var(--ink-dim);font-size:11px;
    padding:8px 4px;border-bottom:1px solid var(--line);
  }
  table.wt td{
    text-align:center;padding:10px 4px;border-bottom:1px solid var(--line);
  }
  table.wt td.emoCell{
    font-family:'Gowun Batang',serif;font-size:17px;text-align:left;
    padding-left:6px;white-space:nowrap;
  }
  table.wt td.emoCell small{
    font-family:'Noto Sans KR',sans-serif;font-size:11px;color:var(--ink-dim);
    margin-left:4px;vertical-align:1px;
  }
  table.wt .cnt{
    display:inline-block;min-width:24px;line-height:24px;border-radius:8px;
  }
  table.wt td.today-col{background:rgba(237,233,224,.04)}

  /* ---------- 최근 기록 ---------- */
  .w-records{width:100%;max-width:400px;margin-top:36px}
  .w-records h3{
    font-size:12px;letter-spacing:.25em;color:var(--ink-dim);
    font-weight:400;margin-bottom:14px;text-align:center;
  }
  .rec{
    display:flex;gap:12px;align-items:flex-start;
    padding:13px 4px;border-bottom:1px solid var(--line);
  }
  .rec .rh{font-family:'Gowun Batang',serif;font-size:19px;width:26px;text-align:center;flex:0 0 auto}
  .rec .rbody{flex:1;min-width:0}
  .rec .rmeta{font-size:11px;color:var(--ink-dim);letter-spacing:.05em}
  .rec .rmemo{font-size:14px;line-height:1.7;margin-top:3px;word-break:break-all}
  .rec .rmemo.none{color:var(--ink-dim);font-size:12px}
  .rec-scroll{max-height:340px;overflow-y:auto;padding-right:4px;
    -webkit-overflow-scrolling:touch;}
  .rec-scroll::-webkit-scrollbar{width:5px}
  .rec-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}
  .memo-item{display:flex;gap:11px;align-items:flex-start;padding:12px 4px;border-bottom:1px solid var(--line)}
  .mi-hanja{font-family:'Gowun Batang',serif;font-size:18px;flex:0 0 auto;width:24px;text-align:center}
  .mi-body{flex:1;min-width:0}
  .mi-text{font-size:14px;line-height:1.7;word-break:break-all}
  .mi-date{font-size:11px;color:var(--ink-dim);margin-top:4px}

  @media (prefers-reduced-motion:reduce){
    .orb{transition:none !important}
    .w-bar{transition:none !important}
  }
</style>
</head>
<body>

<!-- 1. 선택 화면 -->
<section class="screen on" id="select">
  <div class="eyebrow">마음 처방</div>
  <h1>지금, 마음이<br>어떤가요?</h1>
  <div class="grid" id="grid"></div>
  <div class="foot">칠정七情 — 일곱 가지 마음의 날씨<br>하나를 고르면 맞는 호흡을 처방해드려요</div>
  <button class="link-btn" id="btnWeather">나의 마음 날씨 보기</button>
</section>

<!-- 2. 호흡 화면 -->
<section class="screen" id="breath">
  <div class="b-head">
    <div class="hanja-big" id="bHanja"></div>
    <h2 id="bTitle"></h2>
  </div>
  <div class="orb-wrap">
    <div class="orb-ring"></div>
    <div class="orb" id="orb"></div>
    <div class="orb-hanja" id="orbHanja"></div>
  </div>
  <div>
    <div class="phase" id="phase">준비</div>
    <div class="count" id="count"></div>
  </div>
  <div class="b-guide" id="bGuide"></div>
  <div class="btn-row">
    <button class="pill" id="btnBack">처음으로</button>
    <button class="pill primary" id="btnStart">호흡 시작</button>
  </div>
  <button class="link-btn" id="btnSound" style="margin-top:14px">🔔 소리 켜짐</button>
  <div class="cycle-note" id="cycleNote"></div>
</section>

<!-- 3. 마무리 화면 -->
<section class="screen" id="close">
  <div class="eyebrow" id="cEyebrow"></div>
  <div class="wisdom" id="cWisdom"></div>
  <div class="src" id="cSrc"></div>
  <div class="memo-box">
    <input id="memoInput" maxlength="60" placeholder="한 줄 메모를 남겨도 좋아요 (선택)">
    <div class="memo-saved" id="memoSaved"></div>
  </div>
  <div class="btn-row">
    <button class="pill" id="btnAgain">한 번 더</button>
    <button class="pill" id="btnHome">처음으로</button>
  </div>
</section>

<!-- 4. 마음 날씨 -->
<section class="screen" id="weather">
  <div class="w-head">
    <div class="eyebrow">나의 마음 날씨</div>
    <h2 id="wTitle">최근 7일</h2>
    <div class="sub" id="wSub"></div>
  </div>
  <div class="w-tabs">
    <button class="w-tab" data-p="day">오늘</button>
    <button class="w-tab on" data-p="week">이번 주</button>
    <button class="w-tab" data-p="month">이번 달</button>
  </div>
  <div class="w-list" id="wList"></div>
  <div class="w-table-wrap" id="wTableWrap"><div id="wTable"></div></div>
  <div class="w-insight" id="wInsight"></div>
  <div class="w-records" id="wRecords" style="display:none">
    <h3 id="recTitle">기록</h3>
    <div id="recList" class="rec-scroll"></div>
  </div>
  <div class="w-records" id="wMemos" style="display:none">
    <h3 id="memoTitle">메모 모아보기</h3>
    <div id="memoList" class="rec-scroll"></div>
  </div>
  <div class="w-empty" id="wEmpty" style="display:none">
    아직 기록이 없어요.<br>호흡을 한 번 마치면<br>마음 날씨가 쌓이기 시작해요.
  </div>
  <div class="btn-row" style="margin-top:40px">
    <button class="pill" id="btnWeatherBack">처음으로</button>
  </div>
</section>

const $ = id => document.getElementById(id);
let cur = null, running = false, timer = null;
let lastSpokenStep = -1, lastSpokenCycle = -1;

/* build grid */
const grid = $('grid');
EMOTIONS.forEach((e,i)=>{
  const b = document.createElement('button');
  b.className = 'emo' + (i===EMOTIONS.length-1 ? ' wide' : '');
  b.style.setProperty('--c', e.color);
  b.innerHTML = `<span class="hanja">${e.hanja}</span><span class="name">${e.name}</span><div class="desc">${e.desc}</div>`;
  b.onclick = ()=>openBreath(e);
  grid.appendChild(b);
});

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  $(id).classList.add('on');
}

function openBreath(e){
  cur = e; stopBreath();
  lastSpokenStep = -1; lastSpokenCycle = -1;
  const root = $('breath');
  root.style.setProperty('--ec', e.color);
  root.style.setProperty('--ec-soft', e.soft);
  root.style.setProperty('--ec-glow', e.color + '55');
  $('bHanja').textContent = e.hanja;
  $('bTitle').textContent = e.title;
  $('orbHanja').textContent = e.hanja;
  $('bGuide').innerHTML = e.guide;
  $('phase').textContent = '준비되면 시작을 눌러요';
  $('count').textContent = '';
  const total = e.pattern.reduce((a,p)=>a+p[1],0) * e.cycles;
  $('cycleNote').textContent = `${e.cycles}회 반복 · 약 ${Math.round(total/60*10)/10}분`;
  $('orb').style.transition = 'none';
  $('orb').style.transform = 'scale(.62)';
  show('breath');
}

function stopBreath(){
  running = false;
  if(timer){clearTimeout(timer);timer=null}
  $('btnStart').textContent = '호흡 시작';
}

$('btnBack').onclick = ()=>{stopBreath();show('select')};
$('btnStart').onclick = ()=>{
  if(running){stopBreath();$('phase').textContent='멈췄어요';$('count').textContent='';allAudios().forEach(a=>{try{a.pause()}catch(e){}});return}
  running = true;
  $('btnStart').textContent = '멈추기';
  ensureAudio();
  unlockVoice(); /* 모바일: 터치 안에서 음성 재생 권한 확보 */
  if(soundOn){
    bell();
    $('phase').textContent = '';
    $('count').textContent = '';
    timer = setTimeout(()=>{ if(running) runCycle(0,0); }, 2200);
  }else{
    runCycle(0,0);
  }
};

function runCycle(cycle, step){
  if(!running) return;
  if(cycle >= cur.cycles){finish();return}
  const [label, sec] = cur.pattern[step];
  $('phase').textContent = label;
  if(step !== lastSpokenStep || cycle !== lastSpokenCycle){
    speak(label);
    lastSpokenStep = step; lastSpokenCycle = cycle;
  }
  const orb = $('orb');
  orb.style.transition = `transform ${sec}s cubic-bezier(.45,.05,.55,.95)`;
  if(label==='들숨') orb.style.transform = 'scale(1)';
  else if(label==='날숨') orb.style.transform = 'scale(.62)';
  // 멈춤: keep current scale

  let remain = sec;
  $('count').textContent = `${remain} · ${cycle+1}/${cur.cycles}`;
  const tick = ()=>{
    if(!running) return;
    remain--;
    if(remain > 0){
      $('count').textContent = `${remain} · ${cycle+1}/${cur.cycles}`;
      timer = setTimeout(tick, 1000);
    }else{
      const nextStep = (step+1) % cur.pattern.length;
      const nextCycle = nextStep===0 ? cycle+1 : cycle;
      runCycle(nextCycle, nextStep);
    }
  };
  timer = setTimeout(tick, 1000);
}

/* ---------- 소리: 싱잉볼 & 음성 안내 ---------- */
let soundOn = true;
let actx = null;

function ensureAudio(){
  if(!actx){
    try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }
  if(actx && actx.state==='suspended') actx.resume();
}

/* 댕 — 싱잉볼 소리를 코드로 합성 (파일 불필요) */
function bell(){
  if(!soundOn) return;
  ensureAudio();
  if(!actx) return;
  const now = actx.currentTime;
  const master = actx.createGain();
  master.gain.setValueAtTime(0.75, now);
  /* 로우패스로 따뜻하고 어두운 울림 */
  const lp = actx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.setValueAtTime(700, now);
  lp.frequency.exponentialRampToValueAtTime(240, now+7);
  master.connect(lp); lp.connect(actx.destination);
  /* 아주 깊은 보울: 58Hz 서브 기음 + 긴 여운(최대 20초) */
  [
    [58,  1.0, 20],   /* 서브 베이스 기음 */
    [73,  .7,  18],   /* 저역 맥놀이 */
    [110, .45, 15],
    [164, .26, 11],
    [247, .13, 8],
    [370, .05, 5]
  ].forEach(([f,g,dur])=>{
    const o = actx.createOscillator();
    const og = actx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(f, now);
    const lfo = actx.createOscillator();
    const lfoGain = actx.createGain();
    lfo.frequency.setValueAtTime(1.6, now);
    lfoGain.gain.setValueAtTime(f*0.002, now);
    lfo.connect(lfoGain); lfoGain.connect(o.frequency);
    og.gain.setValueAtTime(0, now);
    og.gain.linearRampToValueAtTime(g*0.42, now+0.03);
    og.gain.exponentialRampToValueAtTime(0.0001, now+dur);
    o.connect(og); og.connect(master);
    o.start(now); o.stop(now+dur);
    lfo.start(now); lfo.stop(now+dur);
  });
}

/* 음성 안내 — 클로바더빙 녹음 음성 (기기 TTS 불필요), 감정별 남/여 음성 */
const VOICE_MAP = {'들숨':'inhale','멈춤':'hold','날숨':'exhale'};
const voiceAudio = {a:{}, b:{}, c:{}};
let voiceReady = false;

function initVoice(){
  if(voiceReady) return;
  ['a','b','c'].forEach(g=>{
    ['inhale','hold','exhale'].forEach(k=>{
      const a = new Audio(VOICES[g][k]);
      a.preload = 'auto';
      voiceAudio[g][k] = a;
    });
  });
  voiceReady = true;
}
function allAudios(){
  return [...Object.values(voiceAudio.a), ...Object.values(voiceAudio.b), ...Object.values(voiceAudio.c)];
}
/* 모바일: 사용자 터치 안에서 한 번 깨워줘야 이후 자동재생 가능 */
function unlockVoice(){
  initVoice();
  allAudios().forEach(a=>{
    a.muted = true;
    a.play().then(()=>{a.pause();a.currentTime=0;a.muted=false;}).catch(()=>{a.muted=false;});
  });
}

function speak(phaseLabel){
  if(!soundOn) return;
  const key = VOICE_MAP[phaseLabel];
  if(!key) return;
  initVoice();
  const g = (cur && cur.voice) ? cur.voice : 'a';
  const a = voiceAudio[g][key];
  if(!a) return;
  try{ a.pause(); a.currentTime = 0; a.play().catch(()=>{}); }catch(e){}
}

$('btnSound').onclick = ()=>{
  soundOn = !soundOn;
  $('btnSound').textContent = soundOn ? '🔔 소리 켜짐' : '🔕 소리 꺼짐';
  if(!soundOn) allAudios().forEach(a=>{try{a.pause()}catch(e){}});
};
const LOG_KEY = 'chiljeong_logs';
let lastLogId = null;

function loadLogs(){
  try{return JSON.parse(localStorage.getItem(LOG_KEY)) || []}
  catch(e){return []}
}
function saveLogs(logs){
  try{localStorage.setItem(LOG_KEY, JSON.stringify(logs))}catch(e){}
}
function addLog(emoKey){
  const logs = loadLogs();
  const rec = {id:Date.now(), t:new Date().toISOString(), k:emoKey, m:''};
  logs.push(rec);
  saveLogs(logs);
  lastLogId = rec.id;
}

function finish(){
  running = false;
  bell();
  addLog(cur.key);
  $('cEyebrow').textContent = `${cur.hanja} · ${cur.name}`;
  $('cWisdom').textContent = cur.wisdom;
  $('cSrc').textContent = cur.src;
  $('memoInput').value = '';
  $('memoSaved').textContent = '';
  show('close');
}

/* 메모: 입력 멈추면 자동 저장 */
let memoTimer = null;
$('memoInput').addEventListener('input', ()=>{
  clearTimeout(memoTimer);
  memoTimer = setTimeout(()=>{
    if(!lastLogId) return;
    const logs = loadLogs();
    const rec = logs.find(r=>r.id===lastLogId);
    if(rec){rec.m = $('memoInput').value.trim(); saveLogs(logs);
      $('memoSaved').textContent = '기록했어요';}
  }, 700);
});

/* ---------- 마음 날씨 ---------- */
const DAY_LABELS = ['일','월','화','수','목','금','토'];
const WEEK_COLS = ['월','화','수','목','금','토','일'];
let period = 'week';

function startOfDay(d){const x=new Date(d);x.setHours(0,0,0,0);return x}
/* 월요일 시작 주 */
function mondayOf(d){const x=startOfDay(d);const wd=(x.getDay()+6)%7;x.setDate(x.getDate()-wd);return x}

function renderWeather(){
  const logs = loadLogs();
  const now = new Date();
  let from, title, label;
  if(period==='day'){ from=startOfDay(now); title='오늘'; label='오늘'; }
  else if(period==='week'){ from=mondayOf(now); title='이번 주'; label='이번 주'; }
  else { from=new Date(now.getFullYear(),now.getMonth(),1); title=`${now.getMonth()+1}월`; label='이번 달'; }
  $('wTitle').textContent = title;
  document.querySelectorAll('.w-tab').forEach(t=>t.classList.toggle('on', t.dataset.p===period));

  const sel = logs.filter(r=>{const d=new Date(r.t);return d>=from && d<=now});
  const list=$('wList'), table=$('wTable'),
        insight=$('wInsight'), empty=$('wEmpty'), sub=$('wSub');
  list.innerHTML=''; table.innerHTML=''; insight.textContent='';

  if(sel.length===0){
    empty.style.display='block';
    sub.textContent='';
  }else{
    empty.style.display='none';
    sub.textContent = `${label}, 마음이 ${sel.length}번 다녀갔어요`;

    /* 감정별 합계 막대 */
    const counts = {};
    sel.forEach(r=>counts[r.k]=(counts[r.k]||0)+1);
    const max = Math.max(...Object.values(counts));
    EMOTIONS.forEach(e=>{
      const c = counts[e.key]||0;
      if(!c) return;
      const row = document.createElement('div');
      row.className='w-row';
      row.innerHTML = `
        <div class="wh" style="color:${e.color}">${e.hanja}</div>
        <div class="wn">${e.name.split(' · ')[1]}</div>
        <div class="w-bar-track"><div class="w-bar" style="background:${e.color}" data-w="${(c/max*100)}"></div></div>
        <div class="wc">${c}</div>`;
      list.appendChild(row);
    });
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      list.querySelectorAll('.w-bar').forEach(b=>b.style.width=b.dataset.w+'%');
    }));

    /* 표 */
    if(period==='week') table.appendChild(buildWeekTable(sel, from, now));
    if(period==='month') table.appendChild(buildMonthTable(sel, from, now));

    /* 한 줄 통찰 */
    const topKey = Object.keys(counts).sort((a,b)=>counts[b]-counts[a])[0];
    const INSIGHTS = {
      no:'화가 자주 다녀갔네요.\n화 아래엔 보통 "지켜주고 싶은 것"이 있어요.',
      hui:'기쁨이 많았어요.\n좋은 순간을 알아차린 당신 덕분이에요.',
      bi:'슬픔이 자주 머물렀네요.\n슬픔은 마음이 무언가를 소중히 여겼다는 증거예요.',
      gong:'두려움이 자주 찾아왔어요.\n그때마다 호흡으로 돌아온 당신이 대단해요.',
      gyeong:'놀란 마음이 잦았네요.\n몸을 충분히 쉬게 해주세요.',
      sa:'생각이 많았어요.\n생각이 많다는 건, 애쓰고 있다는 뜻이기도 해요.',
      u:'근심이 자주 다녀갔네요.\n걱정의 대부분은 아직 오지 않은 일이에요.'
    };
    insight.textContent = INSIGHTS[topKey] || '';
    insight.style.whiteSpace = 'pre-line';
  }

  /* 최근 기록 — 현재 기간(오늘/주/달)에 해당하는 기록 전체, 스크롤로 확인 */
  const recWrap = $('wRecords'), recList = $('recList');
  const recent = [...sel].sort((a,b)=>b.id-a.id);
  $('recTitle').textContent = `${label} 기록 (${recent.length})`;
  if(recent.length){
    recWrap.style.display='block';
    recList.innerHTML='';
    recent.forEach(r=>{
      const e = EMOTIONS.find(x=>x.key===r.k);
      if(!e) return;
      const d = new Date(r.t);
      const meta = `${d.getMonth()+1}월 ${d.getDate()}일 (${DAY_LABELS[d.getDay()]}) ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} · ${e.name}`;
      const memoHtml = r.m
        ? `<div class="rmemo">${r.m.replace(/</g,'&lt;')}</div>`
        : `<div class="rmemo none">메모 없이 호흡만 하고 갔어요</div>`;
      const el = document.createElement('div');
      el.className='rec';
      el.innerHTML = `<div class="rh" style="color:${e.color}">${e.hanja}</div>
        <div class="rbody"><div class="rmeta">${meta}</div>${memoHtml}</div>`;
      recList.appendChild(el);
    });
  }else{
    recWrap.style.display='none';
  }

  /* 메모 모아보기 — 현재 기간에 남긴 메모만 */
  const memoWrap = $('wMemos'), memoList = $('memoList');
  const memos = recent.filter(r=>r.m && r.m.trim());
  if(memos.length){
    memoWrap.style.display='block';
    $('memoTitle').textContent = `${label} 메모 모아보기 (${memos.length})`;
    memoList.innerHTML='';
    memos.forEach(r=>{
      const e = EMOTIONS.find(x=>x.key===r.k);
      const d = new Date(r.t);
      const el = document.createElement('div');
      el.className='memo-item';
      el.innerHTML = `<span class="mi-hanja" style="color:${e?e.color:'#999'}">${e?e.hanja:'·'}</span>
        <div class="mi-body"><div class="mi-text">"${r.m.replace(/</g,'&lt;')}"</div>
        <div class="mi-date">${d.getMonth()+1}.${d.getDate()} (${DAY_LABELS[d.getDay()]})</div></div>`;
      memoList.appendChild(el);
    });
  }else{
    memoWrap.style.display='none';
  }
}

/* 이번 주: 감정 × 월~일 표 */
function buildWeekTable(sel, monday, now){
  const t = document.createElement('table');
  t.className='wt';
  const todayIdx = (now.getDay()+6)%7;
  let head = '<tr><th style="text-align:left;padding-left:6px">감정</th>';
  WEEK_COLS.forEach((w,i)=>{
    head += `<th class="${i===todayIdx?'today-col':''}">${w}</th>`;
  });
  head += '</tr>';

  /* day index 0(월)~6(일)별 카운트 */
  const byEmoDay = {};
  sel.forEach(r=>{
    const d = new Date(r.t);
    const di = (d.getDay()+6)%7;
    byEmoDay[r.k] = byEmoDay[r.k] || [0,0,0,0,0,0,0];
    byEmoDay[r.k][di]++;
  });

  let rows = '';
  EMOTIONS.forEach(e=>{
    const arr = byEmoDay[e.key];
    if(!arr) return;
    rows += `<tr><td class="emoCell" style="color:${e.color}">${e.hanja}<small>${e.name.split(' · ')[1]}</small></td>`;
    arr.forEach((c,i)=>{
      const cell = c ? `<span class="cnt" style="background:${e.color}26;color:${e.color}">${c}</span>` : '<span style="color:var(--line)">·</span>';
      rows += `<td class="${i===todayIdx?'today-col':''}">${cell}</td>`;
    });
    rows += '</tr>';
  });
  t.innerHTML = head + rows;
  return t;
}

/* 이번 달: 감정 × 주차 표 (각 주는 월요일 시작) */
function buildMonthTable(sel, monthStart, now){
  const t = document.createElement('table');
  t.className='wt';
  /* 이 달에 걸친 주차들의 월요일 목록 */
  const mondays = [];
  let m = mondayOf(monthStart);
  while(m <= now && m.getMonth() <= now.getMonth()){
    if(m.getMonth()===monthStart.getMonth() || new Date(m.getTime()+6*864e5).getMonth()===monthStart.getMonth()){
      mondays.push(new Date(m));
    }
    m = new Date(m.getTime() + 7*864e5);
    if(m > now) break;
  }
  let head = '<tr><th style="text-align:left;padding-left:6px">감정</th>';
  mondays.forEach((_,i)=>head+=`<th>${i+1}주</th>`);
  head += '<th>합계</th></tr>';

  const byEmoWeek = {};
  sel.forEach(r=>{
    const d = new Date(r.t);
    const wm = mondayOf(d).getTime();
    let wi = mondays.findIndex(x=>x.getTime()===wm);
    if(wi<0) wi = 0;
    byEmoWeek[r.k] = byEmoWeek[r.k] || new Array(mondays.length).fill(0);
    byEmoWeek[r.k][wi]++;
  });

  let rows = '';
  EMOTIONS.forEach(e=>{
    const arr = byEmoWeek[e.key];
    if(!arr) return;
    const sum = arr.reduce((a,b)=>a+b,0);
    rows += `<tr><td class="emoCell" style="color:${e.color}">${e.hanja}<small>${e.name.split(' · ')[1]}</small></td>`;
    arr.forEach(c=>{
      const cell = c ? `<span class="cnt" style="background:${e.color}26;color:${e.color}">${c}</span>` : '<span style="color:var(--line)">·</span>';
      rows += `<td>${cell}</td>`;
    });
    rows += `<td><strong style="font-weight:500">${sum}</strong></td></tr>`;
  });
  t.innerHTML = head + rows;
  return t;
}
